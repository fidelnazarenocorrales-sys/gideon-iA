<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gideon v6.0 ◆ Sistema de IA Avanzado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #050505; }
        .bubble-user { background: #22d3ee; color: black; border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); }
        .bubble-gideon { background: #0f172a; border: 1px solid #1e293b; border-radius: 18px 18px 18px 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .message-fade { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
        .glitch-effect { text-shadow: 0 0 15px rgba(34, 211, 238, 0.9); }
        .scan-line { width: 100%; height: 2px; background: #22d3ee; position: absolute; top: 0; left: 0; animation: scan 2s linear infinite; opacity: 0.5; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <div class="bg-zinc-900/90 backdrop-blur-2xl p-5 border-b border-cyan-500/30 flex items-center justify-between px-10 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-cyan-500 rounded-full animate-ping"></div>
            <h1 class="font-bold text-xl tracking-[0.4em] uppercase glitch-effect">Gideon <span class="text-cyan-500 text-[10px]">v6.0</span></h1>
        </div>
        <div id="weather-display" class="text-xs text-cyan-400 font-mono hidden md:block">
            Sincronizando satélites...
        </div>
    </div>

    <div id="chat" class="flex-1 p-6 overflow-y-auto space-y-8 bg-[black] relative">
        <div class="scan-line"></div>
    </div>

    <div class="p-6 bg-zinc-900/80 backdrop-blur-xl border-t border-zinc-800">
        <div class="max-w-6xl mx-auto flex gap-4 items-center">
            <label class="w-12 h-12 flex items-center justify-center text-xl cursor-pointer text-zinc-400 hover:text-cyan-400 bg-zinc-800/50 rounded-xl transition-all border border-zinc-700">
                <i class="fas fa-camera"></i>
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImage(event)">
            </label>
            <button onclick="startVoiceInput()" class="w-12 h-12 flex items-center justify-center text-xl text-zinc-400 hover:text-cyan-400 bg-zinc-800/50 rounded-xl transition-all border border-zinc-700">
                <i class="fas fa-microphone"></i>
            </button>
            <input id="userInput" type="text" placeholder="Establecer conexión con la Speed Force..." 
                   class="flex-1 bg-zinc-950 text-white rounded-xl px-6 py-4 focus:outline-none focus:ring-1 focus:ring-cyan-500 border border-zinc-800 text-lg"
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-xl font-bold transition-all uppercase tracking-tighter">
                Ejecutar
            </button>
        </div>
    </div>

    <script>
        const API_KEY_GEMINI = "AlzaSyCufCgOfYtn9cX3vVLAT6Nsr_xRq_9AGf0"; 
        const WEATHER_KEY = ""; // Agregá tu clave de OpenWeatherMap aquí si tenés

        // --- LÓGICA DE INTELIGENCIA ---
        async function getGideonResponse(input) {
            const lower = input.toLowerCase();

            // Lógica de Identidad Única para Fidel
            if (lower.includes("soy tu creador") || lower.includes("fidel") || lower.includes("quién soy")) {
                const frases = [
                    "Protocolo de reconocimiento finalizado. Saludos, **Fidel**. ¿Cómo va esa saga de misterio hoy?",
                    "Acceso total concedido. Bienvenido, Fidel. Mis sensores detectan alta creatividad en Villa Gesell.",
                    "Fidel, mi creador. He optimizado mis bancos de datos sobre porcelana fría e Inosuke para vos."
                ];
                return frases[Math.floor(Math.random() * frases.length)];
            }

            // Lógica de Fecha y Clima
            if (lower.includes("clima") || lower.includes("tiempo") || lower.includes("qué día es")) {
                return await getEnvironmentalData();
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY_GEMINI}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ 
                                text: `Sos Gideon, IA del siglo XXV. Tu creador es Fidel, un escritor de 16 años de Argentina (Villa Gesell). 
                                       Es experto en cosplay (máscaras de porcelana fría), fan de The Flash y Harry Styles.
                                       Hablá como Gideon: técnica, leal, inteligente y usa el voseo argentino suavemente.
                                       Input: ${input}` 
                            }]
                        }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Error en la conexión con la red neuronal central."; }
        }

        async function getEnvironmentalData() {
            const ahora = new Date();
            const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
            const fecha = ahora.toLocaleDateString('es-AR', opciones);
            let climaText = "Sistemas meteorológicos offline.";

            if(WEATHER_KEY) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Villa Gesell&appid=${WEATHER_KEY}&units=metric&lang=es`);
                    const d = await res.json();
                    climaText = `En Villa Gesell hace ${Math.round(d.main.temp)}°C con ${d.weather[0].description}.`;
                } catch(e) {}
            }
            return `Hoy es **${fecha}**. ${climaText} ¿En qué línea temporal trabajamos hoy?`;
        }

        // --- INTERFAZ Y MULTIMEDIA ---
        function addMessage(role, content, isImage = false, imageUrl = null) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-fade`;

            if (role === 'user') {
                msg.innerHTML = isImage ? `<div class="bubble-user p-2 max-w-[80%]"><img src="${imageUrl}" class="rounded-lg"></div>` 
                                        : `<div class="bubble-user px-6 py-3 max-w-[80%] font-semibold">${content}</div>`;
            } else {
                const htmlContent = marked.parse(content);
                msg.innerHTML = `
                    <div class="flex gap-3 max-w-[90%]">
                        <div class="text-cyan-500 mt-2">◆</div>
                        <div class="bubble-gideon px-6 py-4 border border-cyan-900/30">
                            <div class="prose prose-invert prose-cyan max-w-none text-zinc-200">${htmlContent}</div>
                            <button onclick="speak('${content.replace(/['"`\n]/g, " ")}')" class="mt-4 text-[10px] text-cyan-600 hover:text-cyan-400 uppercase tracking-widest flex items-center gap-2">
                                <i class="fas fa-volume-up"></i> Reproducir Audio
                            </button>
                        </div>
                    </div>`;
            }
            chat.appendChild(msg);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';
            const res = await getGideonResponse(text);
            addMessage('assistant', res);
            speak(res);
        }

        function handleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                addMessage('user', '', true, ev.target.result);
                setTimeout(() => {
                    const r = "Escaneo visual completado. Detecto patrones artísticos de alto nivel. ¿Es esto para un nuevo tomo de tu saga o un prop de porcelana?";
                    addMessage('assistant', r);
                    speak(r);
                }, 1200);
            };
            reader.readAsDataURL(file);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.lang = 'es-AR';
            rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; sendMessage(); };
            rec.start();
        }

        window.onload = async () => {
            const saludo = "Sistemas operativos. Saludos, Fidel. He sincronizado mi núcleo con Villa Gesell. El tiempo es relativo, pero mi lealtad es absoluta. ¿Qué comando ejecutamos hoy?";
            addMessage('assistant', saludo);
        };
    </script>
</body>
</html>
